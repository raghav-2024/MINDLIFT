<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MINDLIFT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="gradient center">

  <div class="login-card">
    <h2>Welcome Back 🌱</h2>
    <p class="small-text">Login to continue your wellness journey</p>

    <input id="name" type="text" placeholder="Enter your name">
    <input id="phone" type="tel" placeholder="Mobile number">
    <input id="password" type="password" placeholder="Enter password">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

<script>

const API_URL = "https://mindlift-3zmr.onrender.com/api/auth";

/************************
  REGISTER
*************************/
async function register() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API_URL}/register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, phone, password })
  });

  const data = await res.json();
  alert(data.message || "Registered Successfully");
}

/************************
  LOGIN
*************************/
async function login() {
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API_URL}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ phone, password })
  });

  const data = await res.json();

  if (data.token) {
    alert("Login Successful ✅");

    localStorage.setItem("token", data.token);
    localStorage.setItem("username", data.user.name);
    localStorage.setItem("userPhone", data.user.phone);

    window.location.href = "dashboard.html"; // fixed casing
  } else {
    alert(data.message || "Login Failed ❌");
  }
}

</script>

</body>
</html>
